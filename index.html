<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Martial Arts AI Coach</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 700px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            height: 90vh;
            max-height: 800px;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 12px 12px 0 0;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .api-key-input {
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
            background: #f9f9f9;
        }

        .api-key-input label {
            display: block;
            font-size: 12px;
            color: #666;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .api-key-input input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 13px;
            font-family: 'Courier New', monospace;
        }

        .api-key-input input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.coach {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 10px;
            line-height: 1.5;
            font-size: 14px;
        }

        .message.user .message-content {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 2px;
        }

        .message.coach .message-content {
            background: white;
            color: #333;
            border: 1px solid #ddd;
            border-bottom-left-radius: 2px;
        }

        .typing {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
        }

        .typing span {
            width: 8px;
            height: 8px;
            background: #999;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                opacity: 0.3;
            }
            30% {
                opacity: 1;
            }
        }

        .input-area {
            padding: 20px;
            border-top: 1px solid #ddd;
            background: white;
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
        }

        .input-area input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .input-area button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .input-area button:hover {
            transform: translateY(-2px);
        }

        .input-area button:active {
            transform: translateY(0);
        }

        .input-area button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            color: #999;
            text-align: center;
        }

        .empty-state p {
            font-size: 16px;
            margin-bottom: 10px;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 12px 16px;
            border-radius: 6px;
            border-left: 4px solid #c33;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🥊 Martial Arts AI Coach</h1>
            <p>Your personal boxing, Muay Thai & MMA mentor</p>
        </div>

        <div class="api-key-input">
            <label for="apiKey">Google Gemini API Key:</label>
            <input 
                type="password" 
                id="apiKey" 
                placeholder="Enter your Gemini API key (get free at aistudio.google.com/app/apikey)"
            >
        </div>

        <div class="chat-box" id="chatBox">
            <div class="empty-state">
                <p>👋 Welcome to your AI Coach!</p>
                <p style="font-size: 13px; color: #bbb;">Enter your API key and start asking questions about martial arts training</p>
            </div>
        </div>

        <div class="input-area">
            <input 
                type="text" 
                id="messageInput" 
                placeholder="Ask your coach anything..." 
                disabled
            >
            <button id="sendBtn" disabled>Send</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@google/generative-ai"></script>
    <script>
        const apiKeyInput = document.getElementById('apiKey');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const chatBox = document.getElementById('chatBox');

        let genAI;
        let chat;
        const conversationHistory = [];

        // System prompt for the coach
        const systemPrompt = `You are an expert martial arts coach and mentor with decades of experience in boxing, Muay Thai, kickboxing, wrestling, and MMA. 

Your job is to:
- Give personalized advice on techniques, form, and strategy
- Help diagnose and treat training injuries safely
- Provide mental game and mindset coaching
- Create training plans tailored to the fighter
- Answer questions about nutrition, recovery, and conditioning

Always be encouraging, realistic, and safety-conscious. Keep responses concise but detailed (2-4 paragraphs). If something requires a doctor, tell them to see one.`;

        // Initialize when API key is entered
        apiKeyInput.addEventListener('change', (e) => {
            const apiKey = e.target.value.trim();
            if (apiKey) {
                try {
                    genAI = new GoogleGenerativeAI(apiKey);
                    messageInput.disabled = false;
                    sendBtn.disabled = false;
                    chatBox.innerHTML = '<div class="empty-state"><p>✅ API Connected!</p><p style="font-size: 13px; color: #bbb;">Ready to chat with your coach</p></div>';
                    console.log('API Key accepted');
                }catch (error) {
                    console.error('API Error:', error);
                        showError('API connection failed: ' + error.message);
}
        });

        // Send message
        async function sendMessage() {
            const userMessage = messageInput.value.trim();
            if (!userMessage || !genAI) return;

            // Clear input
            messageInput.value = '';
            messageInput.focus();

            // Clear empty state
            if (chatBox.querySelector('.empty-state')) {
                chatBox.innerHTML = '';
            }

            // Add user message to chat
            addMessage(userMessage, 'user');
            conversationHistory.push({ role: 'user', content: userMessage });

            // Show typing indicator
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message coach';
            typingDiv.innerHTML = '<div class="message-content"><div class="typing"><span></span><span></span><span></span></div></div>';
            chatBox.appendChild(typingDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                // Initialize model if not done
                if (!chat) {
                    const model = genAI.getGenerativeModel({ 
                        model: 'gemini-pro',
                        systemInstruction: systemPrompt,
                    });
                    chat = model.startChat();
                }

                // Send message
                const result = await chat.sendMessage(userMessage);
                const coachResponse = result.response.text();

                // Remove typing indicator
                typingDiv.remove();

                // Add coach response
                addMessage(coachResponse, 'coach');
                conversationHistory.push({ role: 'assistant', content: coachResponse });

            } catch (error) {
                typingDiv.remove();
                showError('Error: ' + (error.message || 'Failed to get response. Check your API key.'));
            }

            sendBtn.disabled = false;
        }

        function addMessage(text, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = text;
            messageDiv.appendChild(contentDiv);
            chatBox.appendChild(messageDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function showError(message) {
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error';
            errorDiv.textContent = message;
            chatBox.insertBefore(errorDiv, chatBox.firstChild);
        }

        // Send on button click
        sendBtn.addEventListener('click', () => {
            sendBtn.disabled = true;
            sendMessage();
        });

        // Send on Enter key
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendBtn.disabled = true;
                sendMessage();
            }
        });

        // Load API key from localStorage if exists
        const savedKey = localStorage.getItem('geminiApiKey');
        if (savedKey) {
            apiKeyInput.value = savedKey;
            try {
                genAI = new GoogleGenerativeAI(savedKey);
                messageInput.disabled = false;
                sendBtn.disabled = false;
            } catch {}
        }

        // Save API key to localStorage
        apiKeyInput.addEventListener('change', (e) => {
            localStorage.setItem('geminiApiKey', e.target.value);
        });
    </script>
</body>
</html>
